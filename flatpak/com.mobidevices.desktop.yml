app-id: com.mobidevices.desktop
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: mobidevices-app

finish-args:
  # Network access for WebView
  - --share=network
  # X11 and Wayland display
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  # GPU acceleration
  - --device=dri
  # Audio/video (if needed for media playback)
  - --socket=pulseaudio
  # Desktop integration
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - name: mobidevices
    buildsystem: simple
    build-commands:
      - sh install-linux-assets.sh mobidevices-app /app/bin mobidevices-app mobidevices.desktop.in /app/share com.mobidevices.desktop.desktop mobidevices-app com.mobidevices.desktop icons com.mobidevices.desktop
    sources:
      - type: file
        path: ../src-tauri/target/release/mobidevices-app
      - type: file
        path: ../scripts/install-linux-assets.sh
      - type: file
        path: ../linux/mobidevices.desktop.in
      - type: dir
        path: ../src-tauri/icons
        dest: icons
