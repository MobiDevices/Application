app-id: com.mobidevices.desktop
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: mobidevices-app

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: mobidevices
    buildsystem: simple
    build-commands:
      - sh install-linux-assets.sh mobidevices-app /app/bin mobidevices-app mobidevices.desktop.in /app/share com.mobidevices.desktop.desktop mobidevices-app com.mobidevices.desktop icons com.mobidevices.desktop com.mobidevices.desktop.metainfo.xml com.mobidevices.desktop.metainfo.xml
    sources:
      - type: file
        path: ../src-tauri/target/release/mobidevices-app
      - type: file
        path: ../scripts/install-linux-assets.sh
      - type: file
        path: ../linux/mobidevices.desktop.in
      - type: file
        path: ../linux/com.mobidevices.desktop.metainfo.xml
      - type: dir
        path: ../src-tauri/icons
        dest: icons
