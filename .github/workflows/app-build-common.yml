name: App Build Common

on:
    workflow_call:
        inputs:
            artifact_prefix:
                required: true
                type: string

jobs:
    build:
        name: Build ${{ matrix.asset_dir }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: ubuntu-22.04
                      args: --bundles appimage
                      asset_dir: linux-x64
                      snap_bundle_name: mobidevices-linux-x64.snap
                      flatpak_bundle_name: mobidevices-linux-x64.flatpak
                    - platform: ubuntu-22.04-arm
                      args: --bundles appimage
                      asset_dir: linux-arm64
                      snap_bundle_name: mobidevices-linux-arm64.snap
                      flatpak_bundle_name: mobidevices-linux-arm64.flatpak
                    # - platform: macos-latest
                    #   args: --target aarch64-apple-darwin --bundles app,dmg
                    # - platform: windows-latest
                    #   args: --bundles nsis,msi

        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: 1.93.1

            - name: Cache Rust build artifacts
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: |
                      src-tauri -> target

            - name: Install app dependencies
              run: npm ci

            - name: Install native dependencies (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      appstream \
                      build-essential \
                      cargo \
                      debhelper \
                      desktop-file-utils \
                      dpkg-dev \
                      fakeroot \
                      flatpak \
                      flatpak-builder \
                      libappindicator3-dev \
                      librsvg2-dev \
                      libwebkit2gtk-4.1-dev \
                      patchelf

            - name: Validate Linux desktop metadata (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              run: |
                  set -euxo pipefail
                  bash linux/validate-assets.sh

            - name: Build Tauri app
              uses: tauri-apps/tauri-action@v0.6.2
              with:
                  projectPath: .
                  args: ${{ matrix.args }}

            - name: Build Debian package (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              id: debian
              run: |
                  set -euxo pipefail
                  deb_output_dir="$RUNNER_TEMP/deb"
                  rm -rf "$deb_output_dir"
                  mkdir -p "$deb_output_dir"
                  find "$GITHUB_WORKSPACE/.." -maxdepth 1 -type f \( \
                      -name 'mobidevices_*.deb' -o \
                      -name 'mobidevices_*.buildinfo' -o \
                      -name 'mobidevices_*.changes' \
                  \) -delete
                  dpkg-buildpackage -us -uc -b
                  find "$GITHUB_WORKSPACE/.." -maxdepth 1 -type f -name 'mobidevices_*.deb' -exec mv {} "$deb_output_dir/" \;
                  deb_path=$(find "$deb_output_dir" -maxdepth 1 -type f -name 'mobidevices_*.deb' -print -quit)
                  [ -n "$deb_path" ]
                  echo "deb=$deb_path" >> "$GITHUB_OUTPUT"

            - name: Install Snapcraft (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              run: |
                  set -euxo pipefail

                  if [ "$(stat -c '%u:%g' /)" != '0:0' ]; then
                      sudo chown root:root /
                  fi

                  sudo groupadd --force --system lxd
                  sudo usermod --append --groups lxd "$USER"

                  if snap list lxd >/dev/null 2>&1; then
                      sudo snap refresh lxd || true
                  else
                      sudo snap install lxd
                  fi

                  sudo /snap/bin/lxd init --auto
                  sudo iptables -P FORWARD ACCEPT

                  if snap list snapcraft >/dev/null 2>&1; then
                      sudo snap refresh snapcraft || true
                  else
                      sudo snap install snapcraft --classic
                  fi

                  echo /snap/bin >> "$GITHUB_PATH"

            - name: Build Snap package (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              id: snapcraft
              env:
                  SNAPCRAFT_BUILD_PROVIDER: lxd
              run: |
                  set -euxo pipefail
                  snap_path="$RUNNER_TEMP/${{ matrix.snap_bundle_name }}"
                  export SNAPCRAFT_BUILD_INFO=1
                  export SNAPCRAFT_IMAGE_INFO="$(printf '{\"build_url\":\"https://github.com/%s/actions/runs/%s\"}' "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")"
                  sudo -u "$USER" -E bash snap/build.sh "$snap_path"
                  echo "snap=$snap_path" >> "$GITHUB_OUTPUT"

            - name: Install Flatpak runtime dependencies (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              run: |
                  flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
                  flatpak --user install -y flathub org.gnome.Platform//50 org.gnome.Sdk//50 org.freedesktop.Sdk.Extension.rust-stable//25.08

            - name: Build Flatpak package (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              id: flatpak
              run: |
                  set -euxo pipefail
                  flatpak_bundle_path="$RUNNER_TEMP/${{ matrix.flatpak_bundle_name }}"
                  bash flatpak/build.sh "$flatpak_bundle_path"
                  echo "bundle=$flatpak_bundle_path" >> "$GITHUB_OUTPUT"

            - name: Stage build assets
              if: startsWith(matrix.platform, 'ubuntu-')
              id: staged_assets
              env:
                  DEB_PATH: ${{ steps.debian.outputs.deb }}
                  SNAP_PATH: ${{ steps.snapcraft.outputs.snap }}
                  FLATPAK_PATH: ${{ steps.flatpak.outputs.bundle }}
              run: |
                  set -euxo pipefail
                  release_root="$GITHUB_WORKSPACE/dist/release"
                  stage_dir="$release_root/${{ matrix.asset_dir }}"
                  rm -rf "$stage_dir"
                  mkdir -p "$stage_dir"

                  find "$GITHUB_WORKSPACE/src-tauri/target" -type f -name '*.AppImage' -exec cp {} "$stage_dir/" \;

                  for asset in "$DEB_PATH" "$SNAP_PATH" "$FLATPAK_PATH"; do
                      [ -n "$asset" ] || continue
                      cp "$asset" "$stage_dir/"
                  done

                  staged_file=$(find "$stage_dir" -maxdepth 1 -type f -print -quit)
                  [ -n "$staged_file" ]

                  echo "dir=$release_root" >> "$GITHUB_OUTPUT"
                  echo "stage_dir=$stage_dir" >> "$GITHUB_OUTPUT"

            - name: Upload build artifacts
              uses: actions/upload-artifact@v6
              with:
                  name: ${{ inputs.artifact_prefix }}-${{ matrix.asset_dir }}
                  path: ${{ steps.staged_assets.outputs.dir }}/**
                  if-no-files-found: error
