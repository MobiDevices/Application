name: Release Tauri App

on:
    workflow_dispatch:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        env:
            SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      args: --target aarch64-apple-darwin --bundles app,dmg
                    - platform: ubuntu-22.04
                      args: --bundles deb,appimage
                    - platform: windows-latest
                      args: --bundles nsis,msi

        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: 1.93.1

            - name: Install native dependencies (Linux only)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    appstream \
                    desktop-file-utils \
                    flatpak \
                    flatpak-builder \
                    libappindicator3-dev \
                    librsvg2-dev \
                    libwebkit2gtk-4.1-dev \
                    patchelf

            - name: Install Flatpak runtime dependencies (Linux only)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
                  flatpak --user install -y flathub org.gnome.Platform//47 org.gnome.Sdk//47 org.freedesktop.Sdk.Extension.rust-stable//24.08

            - name: Install app dependencies
              run: npm install

            - name: Build and publish Tauri release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: tauri-apps/tauri-action@v0.6.2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  projectPath: .
                  args: ${{ matrix.args }}
                  tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
                  releaseName: MobiDevices v__VERSION__
                  releaseBody: Install bundles for Linux, macOS, and Windows are attached to this release.
                  generateReleaseNotes: true
                  prerelease: false

            - name: Build Tauri app
              if: github.event_name == 'workflow_dispatch'
              uses: tauri-apps/tauri-action@v0.6.2
              with:
                  projectPath: .
                  args: ${{ matrix.args }}

            - name: Validate Linux desktop metadata (Linux only)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  set -euxo pipefail
                  bash scripts/validate-linux-assets.sh src-tauri/target/release/mobidevices-app

            - name: Prepare Snap build inputs (Linux only)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  set -euxo pipefail
                  bash scripts/prepare-snap-build-inputs.sh .

            - name: Build Snap package (Linux only)
              if: matrix.platform == 'ubuntu-22.04'
              id: snapcraft
              uses: snapcore/action-build@v1
              with:
                  path: snap

            - name: Publish Snap to Snap Store
              if: matrix.platform == 'ubuntu-22.04' && env.SNAPCRAFT_STORE_CREDENTIALS != '' && startsWith(github.ref, 'refs/tags/v')
              uses: snapcore/action-publish@v1
              env:
                  SNAPCRAFT_STORE_CREDENTIALS: ${{ env.SNAPCRAFT_STORE_CREDENTIALS }}
              with:
                  snap: ${{ steps.snapcraft.outputs.snap }}
                  release: stable

            - name: Build Flatpak package (Linux only)
              if: matrix.platform == 'ubuntu-22.04'
              working-directory: flatpak
              run: |
                  set -euxo pipefail
                  flatpak-builder --user --install-deps-from=flathub --repo=repo --force-clean build-dir com.mobidevices.desktop.yml
                  flatpak build-bundle repo mobidevices.flatpak com.mobidevices.desktop

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: release-${{ matrix.platform }}
                  path: |
                    src-tauri/target/**/release/bundle/**/*.deb
                    src-tauri/target/**/release/bundle/**/*.AppImage
                    src-tauri/target/**/release/bundle/**/*.dmg
                    src-tauri/target/**/release/bundle/**/*.app
                    src-tauri/target/**/release/bundle/**/*.msi
                    src-tauri/target/**/release/bundle/**/*.exe
                    src-tauri/target/**/release/bundle/**/*.msix
                    ${{ steps.snapcraft.outputs.snap }}
                    flatpak/*.flatpak

            - name: Upload Linux store bundles to GitHub release
              if: matrix.platform == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/v')
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euxo pipefail
                  gh release upload "$GITHUB_REF_NAME" \
                    "${{ steps.snapcraft.outputs.snap }}" \
                    flatpak/mobidevices.flatpak \
                    --clobber

    checksums:
        needs: build
        runs-on: ubuntu-22.04

        steps:
            - name: Download release artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: release-*
                  path: release-artifacts
                  merge-multiple: true

            - name: Generate SHA256SUMS
              run: |
                  set -euxo pipefail
                  mapfile -d '' files < <(find release-artifacts -type f \( \
                    -name '*.deb' -o \
                    -name '*.AppImage' -o \
                    -name '*.dmg' -o \
                    -name '*.msi' -o \
                    -name '*.exe' -o \
                    -name '*.msix' -o \
                    -name '*.snap' -o \
                    -name '*.flatpak' \
                  \) -print0 | sort -z)

                  if [ "${#files[@]}" -eq 0 ]; then
                      echo "No release artifacts found for checksum generation" >&2
                      exit 1
                  fi

                  sha256sum "${files[@]}" > release-artifacts/SHA256SUMS.txt

            - name: Upload checksum artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-checksums
                  path: release-artifacts/SHA256SUMS.txt

            - name: Upload checksums to GitHub release
              if: startsWith(github.ref, 'refs/tags/v')
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euxo pipefail
                  gh release upload "$GITHUB_REF_NAME" release-artifacts/SHA256SUMS.txt --clobber
