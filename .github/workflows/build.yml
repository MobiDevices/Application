name: Release Tauri App

on:
    workflow_dispatch:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        env:
            SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    # - platform: macos-latest
                    #   args: --target aarch64-apple-darwin --bundles app,dmg
                    - platform: ubuntu-24.04
                      args: --bundles appimage
                    # - platform: windows-latest
                    #   args: --bundles nsis,msi

        runs-on: ${{ matrix.platform }}

        steps:
            # Source and toolchain setup
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: 1.93.1

            - name: Install app dependencies
              run: npm install

            - name: Install native dependencies (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    appstream \
                    build-essential \
                    cargo \
                    debhelper \
                    desktop-file-utils \
                    dpkg-dev \
                    fakeroot \
                    flatpak \
                    flatpak-builder \
                    libappindicator3-dev \
                    librsvg2-dev \
                    libwebkit2gtk-4.1-dev \
                    patchelf

            # Linux metadata validation
            - name: Validate Linux desktop metadata (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              run: |
                  set -euxo pipefail
                  bash linux/validate-assets.sh

            # Tauri bundle build
            - name: Build and publish Tauri release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: tauri-apps/tauri-action@v0.6.2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  projectPath: .
                  args: ${{ matrix.args }}
                  tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
                  releaseName: MobiDevices v__VERSION__
                  releaseBody: Install bundles are attached to this release.
                  generateReleaseNotes: true
                  prerelease: false

            - name: Build Tauri app
              if: github.event_name == 'workflow_dispatch'
              uses: tauri-apps/tauri-action@v0.6.2
              with:
                  projectPath: .
                  args: ${{ matrix.args }}

            - name: Build Debian package (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              id: debian
              run: |
                  set -euxo pipefail
                  deb_output_dir="$RUNNER_TEMP/deb"
                  rm -rf "$deb_output_dir"
                  mkdir -p "$deb_output_dir"
                  find "$GITHUB_WORKSPACE/.." -maxdepth 1 -type f \( \
                    -name 'mobidevices_*.deb' -o \
                    -name 'mobidevices_*.buildinfo' -o \
                    -name 'mobidevices_*.changes' \
                  \) -delete
                  dpkg-buildpackage -us -uc -b
                  find "$GITHUB_WORKSPACE/.." -maxdepth 1 -type f -name 'mobidevices_*.deb' -exec mv {} "$deb_output_dir/" \;
                  deb_path=$(find "$deb_output_dir" -maxdepth 1 -type f -name 'mobidevices_*.deb' -print -quit)
                  [ -n "$deb_path" ]
                  echo "deb=$deb_path" >> "$GITHUB_OUTPUT"

            # Flatpak packaging
            - name: Install Flatpak runtime dependencies (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              run: |
                  flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
                  flatpak --user install -y flathub org.gnome.Platform//50 org.gnome.Sdk//50 org.freedesktop.Sdk.Extension.rust-stable//25.08

            - name: Build Flatpak package (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              id: flatpak
              run: |
                  set -euxo pipefail
                  flatpak_bundle_path="$RUNNER_TEMP/mobidevices.flatpak"
                  bash flatpak/build.sh "$flatpak_bundle_path"
                  echo "bundle=$flatpak_bundle_path" >> "$GITHUB_OUTPUT"

            - name: Export Flathub submission bundle (Linux release only)
              if: startsWith(matrix.platform, 'ubuntu-') && startsWith(github.ref, 'refs/tags/v')
              id: flathub_submission
              run: |
                  set -euxo pipefail
                  submission_dir="$RUNNER_TEMP/flathub-submission"
                  archive_path="$RUNNER_TEMP/mobidevices-flathub-submission-${GITHUB_REF_NAME}.tar.gz"
                  bash flatpak/export-flathub-submission.sh "$GITHUB_REF_NAME" "$submission_dir"
                  tar -C "$submission_dir" -czf "$archive_path" .
                  echo "archive=$archive_path" >> "$GITHUB_OUTPUT"

            # Snap packaging
            - name: Install Snapcraft (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              run: |
                  set -euxo pipefail

                  if [ "$(stat -c '%u:%g' /)" != '0:0' ]; then
                      sudo chown root:root /
                  fi

                  sudo groupadd --force --system lxd
                  sudo usermod --append --groups lxd "$USER"

                  if snap list lxd >/dev/null 2>&1; then
                      sudo snap refresh lxd || true
                  else
                      sudo snap install lxd
                  fi

                  sudo /snap/bin/lxd init --auto
                  sudo iptables -P FORWARD ACCEPT

                  if snap list snapcraft >/dev/null 2>&1; then
                        sudo snap refresh snapcraft || true
                  else
                      sudo snap install snapcraft --classic
                  fi

                  echo /snap/bin >> "$GITHUB_PATH"

            - name: Build Snap package (Linux only)
              if: startsWith(matrix.platform, 'ubuntu-')
              id: snapcraft
              env:
                  SNAPCRAFT_BUILD_PROVIDER: lxd
              run: |
                  set -euxo pipefail
                  snap_path="$RUNNER_TEMP/mobidevices.snap"
                  export SNAPCRAFT_BUILD_INFO=1
                  export SNAPCRAFT_IMAGE_INFO="$(printf '{\"build_url\":\"https://github.com/%s/actions/runs/%s\"}' "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")"
                  sudo -u "$USER" -E bash snap/build.sh "$snap_path"
                  echo "snap=$snap_path" >> "$GITHUB_OUTPUT"

            # Publishing and artifact upload
            - name: Publish Snap to Snap Store
              if: startsWith(matrix.platform, 'ubuntu-') && env.SNAPCRAFT_STORE_CREDENTIALS != '' && startsWith(github.ref, 'refs/tags/v')
              env:
                  SNAPCRAFT_STORE_CREDENTIALS: ${{ env.SNAPCRAFT_STORE_CREDENTIALS }}
              run: |
                  set -euxo pipefail
                  snapcraft upload --release=stable "${{ steps.snapcraft.outputs.snap }}"

            - name: Stage release assets
              if: startsWith(matrix.platform, 'ubuntu-')
              id: release_assets
              env:
                  DEB_PATH: ${{ steps.debian.outputs.deb }}
                  SNAP_PATH: ${{ steps.snapcraft.outputs.snap }}
                  FLATPAK_PATH: ${{ steps.flatpak.outputs.bundle }}
                  FLATHUB_ARCHIVE: ${{ steps.flathub_submission.outputs.archive }}
              run: |
                  set -euxo pipefail
                  release_root="$GITHUB_WORKSPACE/dist/release"
                  stage_dir="$release_root/linux"
                  rm -rf "$stage_dir"
                  mkdir -p "$stage_dir"

                  find "$GITHUB_WORKSPACE/src-tauri/target" -type f -name '*.AppImage' -exec cp {} "$stage_dir/" \;

                  for asset in "$DEB_PATH" "$SNAP_PATH" "$FLATPAK_PATH" "$FLATHUB_ARCHIVE"; do
                      [ -n "$asset" ] || continue
                      cp "$asset" "$stage_dir/"
                  done

                  echo "dir=$release_root" >> "$GITHUB_OUTPUT"

            - name: Upload build artifacts
              uses: actions/upload-artifact@v6
              with:
                  name: release-${{ matrix.platform }}
                  path: ${{ steps.release_assets.outputs.dir }}/**
                  if-no-files-found: error

            - name: Upload Linux store bundles to GitHub release
              if: startsWith(matrix.platform, 'ubuntu-') && startsWith(github.ref, 'refs/tags/v')
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euxo pipefail
                  release_dir="${{ steps.release_assets.outputs.dir }}/linux"
                  gh release upload "$GITHUB_REF_NAME" "$release_dir"/* --clobber

    checksums:
        needs: build
        runs-on: ubuntu-24.04

        steps:
            - name: Download release artifacts
              uses: actions/download-artifact@v8
              with:
                  pattern: release-*
                  path: release-artifacts
                  merge-multiple: true

            - name: Generate SHA256SUMS
              run: |
                  set -euxo pipefail
                  mapfile -d '' files < <(find release-artifacts -type f \( \
                    -name '*.deb' -o \
                    -name '*.AppImage' -o \
                    -name '*.dmg' -o \
                    -name '*.msi' -o \
                    -name '*.exe' -o \
                    -name '*.msix' -o \
                    -name '*.snap' -o \
                    -name '*.flatpak' -o \
                    -name '*.tar.gz' \
                  \) -print0 | sort -z)

                  if [ "${#files[@]}" -eq 0 ]; then
                      echo "No release artifacts found for checksum generation" >&2
                      exit 1
                  fi

                  sha256sum "${files[@]}" > release-artifacts/SHA256SUMS.txt

            - name: Upload checksum artifact
              uses: actions/upload-artifact@v6
              with:
                  name: release-checksums
                  path: release-artifacts/SHA256SUMS.txt

            - name: Upload checksums to GitHub release
              if: startsWith(github.ref, 'refs/tags/v')
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euxo pipefail
                  gh release upload "$GITHUB_REF_NAME" release-artifacts/SHA256SUMS.txt --clobber
