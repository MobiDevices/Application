name: mobidevices
version: '1.0.0'
summary: Media about gadgets and technologies
description: |
  MobiDevices is a native desktop application for accessing mobidevices.com.
  Browse the latest news, reviews, and articles about gadgets and technology
  in a fast, lightweight desktop environment.

base: core22
confinement: strict
grade: stable

apps:
  mobidevices:
    command: bin/mobidevices-app
    desktop: usr/share/applications/mobidevices.desktop
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - audio-playback
      - home

parts:
  mobidevices:
    plugin: nil
    override-build: |
      set -eux
      sh "$CRAFT_PROJECT_DIR/.ci/install-linux-assets.sh" \
        "$CRAFT_PROJECT_DIR/.ci/mobidevices-app" \
        "$CRAFT_PART_INSTALL/bin" \
        mobidevices-app \
        "$CRAFT_PROJECT_DIR/.ci/mobidevices.desktop.in" \
        "$CRAFT_PART_INSTALL/usr/share" \
        mobidevices.desktop \
        mobidevices \
        mobidevices \
        "$CRAFT_PROJECT_DIR/.ci/icons" \
        mobidevices
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libappindicator3-1
