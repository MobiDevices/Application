name: mobidevices
title: MobiDevices
version: '1.0.0'
summary: Native desktop access to MobiDevices.com
description: |
  MobiDevices is a native desktop application for accessing mobidevices.com.
  Browse gadget news, reviews, and technology articles in a lightweight
  desktop window with native navigation, external-link handling, and
  persistent window state.
website: https://mobidevices.com
source-code: https://github.com/MobiDevices/MobiDevices
issues: https://github.com/MobiDevices/MobiDevices/issues
contact: md@mobidevices.com
license: MIT

base: core22
confinement: strict
grade: stable

apps:
  mobidevices:
    command: bin/mobidevices-app
    desktop: usr/share/applications/com.mobidevices.desktop.desktop
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - audio-playback

parts:
  mobidevices:
    plugin: nil
    source: ..
    override-build: |
      set -eux
      sh "$CRAFT_PART_SRC/scripts/install-linux-assets.sh" \
        "$CRAFT_PART_SRC/src-tauri/target/release/mobidevices-app" \
        "$CRAFT_PART_INSTALL/bin" \
        mobidevices-app \
        "$CRAFT_PART_SRC/linux/mobidevices.desktop.in" \
        "$CRAFT_PART_INSTALL/usr/share" \
        com.mobidevices.desktop.desktop \
        mobidevices \
        com.mobidevices.desktop \
        "$CRAFT_PART_SRC/src-tauri/icons" \
        com.mobidevices.desktop \
        "$CRAFT_PART_SRC/linux/com.mobidevices.desktop.metainfo.xml" \
        com.mobidevices.desktop.metainfo.xml
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libappindicator3-1
