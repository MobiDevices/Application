name: mobidevices
title: MobiDevices
version: '1.0.1'
summary: Read MobiDevices.com in a desktop app
description: |
    MobiDevices brings https://mobidevices.com into a desktop app.
    Browse gadget news, reviews, and technology articles with built-in
    navigation, proper external-link handling, and restored window state.
website: https://mobidevices.com
source-code: https://github.com/MobiDevices/MobiDevices-app
issues: https://github.com/MobiDevices/MobiDevices-app/issues
contact: md@mobidevices.com
license: WTFPL
icon: gui/icon.png

base: core24
confinement: strict
grade: stable
platforms:
    amd64:
        build-on: [amd64]
        build-for: [amd64]
    arm64:
        build-on: [arm64]
        build-for: [arm64]

plugs:
    gpu-2404:
        interface: content
        target: $SNAP/gpu-2404
        default-provider: mesa-2404

layout:
    /usr/share/libdrm:
        bind: $SNAP/gpu-2404/libdrm
    /usr/share/drirc.d:
        symlink: $SNAP/gpu-2404/drirc.d

apps:
    mobidevices:
        command: bin/mobidevices-launcher
        desktop: usr/share/applications/com.mobidevices.desktop.desktop
        common-id: com.mobidevices.desktop
        extensions: [gnome]
        environment:
            NO_AT_BRIDGE: "1"
            GDK_BACKEND: x11
            G_MESSAGES_DEBUG: ""
        plugs:
            - network
            - network-bind
            - network-status
            - desktop
            - desktop-legacy
            - wayland
            - x11
            - opengl
            - hardware-observe
            - audio-playback
            - gpu-2404

parts:
    mobidevices:
        plugin: nil
        override-build: |
            set -eux
            sh "$CRAFT_PROJECT_DIR/.ci/install-assets.sh" \
                "$CRAFT_PROJECT_DIR/.ci/mobidevices-app" \
                "$CRAFT_PART_INSTALL/bin" \
                mobidevices-app \
                "$CRAFT_PROJECT_DIR/.ci/mobidevices.desktop.in" \
                "$CRAFT_PART_INSTALL/usr/share" \
                com.mobidevices.desktop.desktop \
                mobidevices \
                com.mobidevices.desktop \
                "$CRAFT_PROJECT_DIR/.ci/icons" \
                com.mobidevices.desktop \
                "$CRAFT_PROJECT_DIR/.ci/com.mobidevices.desktop.metainfo.xml" \
                com.mobidevices.desktop.metainfo.xml
        prime:
            - -usr/share/doc/*
            - -usr/share/man/*
            - -usr/share/lintian/*
            - -usr/share/bug/*
            - -usr/share/bash-completion/*
            - -usr/share/zsh/*
            - -usr/share/doc-base/*
            - -usr/share/pkgconfig/*
            - -usr/share/hunspell/*
            - -usr/share/hunspell-bdic/*
            - -usr/share/dictionaries-common/*
            - -usr/lib/aspell/*
            - -usr/lib/emacsen-common/*
        stage-packages:
            - libwebkit2gtk-4.1-0
            - libgl1-mesa-dri
            - libgles2

    launcher:
        plugin: dump
        source: local/
        organize:
            bin/mobidevices-launcher: bin/mobidevices-launcher
        override-build: |
            craftctl default
            chmod +x "$CRAFT_PART_INSTALL/bin/mobidevices-launcher"
